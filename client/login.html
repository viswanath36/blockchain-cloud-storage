<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secure Login</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
}

.login-box{
  background:white;
  padding:35px;
  width:350px;
  border-radius:10px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:5px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  border:none;
  background:#2a6edb;
  color:white;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#1f56b5;
}

.link{
  margin-top:10px;
  display:block;
  color:#2a6edb;
  cursor:pointer;
  text-decoration:none;
}

#loginMsg{
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Secure Login</h2>

  <form id="loginForm">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <input type="text" id="otp" placeholder="Google Authenticator OTP">
    <button type="submit">Login</button>
  </form>

  <div id="loginMsg"></div>

  <a class="link" href="forgot.html">Forgot Password?</a>
  <p>New user? <a class="link" href="register.html">Register here</a></p>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const otp = document.getElementById("otp").value;
  const msg = document.getElementById("loginMsg");

  msg.style.color="black";
  msg.innerText="Checking credentials...";

  try{
    const res = await fetch("/api/auth/login",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ email,password,otp })
    });

    const data = await res.json();

    if(res.status === 200 && data.token){
      localStorage.setItem("token", data.token);

      msg.style.color="green";
      msg.innerText="Login successful";

      setTimeout(()=>{
        window.location.href="dashboard.html";
      },800);

    }else{
      msg.style.color="red";
      msg.innerText=data.message || "Invalid email or password";
    }

  }catch(err){
    msg.style.color="red";
    msg.innerText="Server error";
  }
});
</script>

</body>
</html>
